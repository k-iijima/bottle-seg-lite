name: Deploy Flutter web to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 学習済みモデル（fp32 + int8）は git 管理外なので最新リリースから取得する
      - name: Download trained models from Releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo "$GITHUB_REPOSITORY" \
            --pattern 'rtmdet_ins*.onnx' --dir app/assets/models

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build web
        working-directory: app
        run: |
          flutter pub get
          # --pwa-strategy none: Flutter の Service Worker は coi-serviceworker と
          # スコープが衝突するため無効化する（index.html 参照）
          flutter build web --release --pwa-strategy none \
            --base-href "/${{ github.event.repository.name }}/"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
