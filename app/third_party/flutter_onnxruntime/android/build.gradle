group = "com.masicai.flutteronnxruntime"
version = "1.0-SNAPSHOT"

buildscript {
    ext.kotlin_version = "2.1.0"
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath("com.android.tools.build:gradle:8.7.0")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version")
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: "com.android.library"
apply plugin: "kotlin-android"

android {
    namespace = "com.masicai.flutteronnxruntime"

    compileSdk = 35

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_11
        targetCompatibility = JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_11
    }

    sourceSets {
        main.java.srcDirs += "src/main/kotlin"
        test.java.srcDirs += "src/test/kotlin"
    }

    defaultConfig {
        minSdk = 21
    }

    dependencies {
        testImplementation("org.jetbrains.kotlin:kotlin-test")
        testImplementation("org.mockito:mockito-core:5.0.0")
        implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
        // LOCAL PATCH: 1.22.0 -> 1.27.0（Web の ort-web と同一バージョンに揃える）。
        // QNN 同梱版 (onnxruntime-android-qnn) も試したが、SM8550 実機で
        // HTP は QNN_DEVICE_ERROR_INVALID_CONFIG（OEM の cDSP 制限疑い）、
        // GPU バックエンドはプラットフォームエラーで全滅だったため、
        // APK +130MB を避けて通常版に戻した（QNN を試す場合はここを
        // onnxruntime-android-qnn に差し替え、detector.dart で QNN を指定）。
        implementation 'com.microsoft.onnxruntime:onnxruntime-android:1.27.0'
    }

    testOptions {
        unitTests.all {
            useJUnitPlatform()

            testLogging {
               events "passed", "skipped", "failed", "standardOut", "standardError"
               outputs.upToDateWhen {false}
               showStandardStreams = true
            }
        }
    }
}
